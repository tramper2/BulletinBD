<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artractive Board Widget</title>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">
  
  <style>
    :root {
      --font-primary: 'Inter', sans-serif;
      --font-title: 'Outfit', sans-serif;
      
      --color-bg-dark: #0b0f19;
      --color-primary: #8b5cf6;
      --color-primary-hover: #7c3aed;
      --color-primary-glow: rgba(139, 92, 246, 0.15);
      --color-secondary: #1e293b;
      --color-secondary-hover: #334155;
      
      --color-text: #f8fafc;
      --color-text-muted: #94a3b8;
      
      --color-success: #10b981;
      --color-danger: #ef4444;
      --color-warning: #f59e0b;
      
      --glass-bg: rgba(30, 41, 59, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg-dark);
      color: var(--color-text);
      font-family: var(--font-primary);
      line-height: 1.6;
      overflow-x: hidden;
      padding: 2rem 1rem;
    }

    /* Glow Backgrounds */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--color-primary-glow) 0%, rgba(0,0,0,0) 70%);
      z-index: -1;
      filter: blur(40px);
      pointer-events: none;
    }
    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; }

    /* Main Container */
    .board-container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Glass Card styling */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--glass-glow);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      transition: var(--transition-smooth);
    }

    /* Header styling */
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .board-title h1 {
      font-family: var(--font-title);
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }

    .board-title p {
      color: var(--color-text-muted);
      font-size: 0.95rem;
    }

    /* Button styles */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-family: var(--font-primary);
      transition: var(--transition-smooth);
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: white;
      box-shadow: 0 4px 14px 0 rgba(124, 58, 237, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(124, 58, 237, 0.6);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--color-secondary);
      color: var(--color-text);
      border: 1px solid var(--glass-border);
    }
    .btn-secondary:hover {
      background: var(--color-secondary-hover);
      border-color: rgba(255,255,255,0.15);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--color-danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .btn-danger:hover {
      background: var(--color-danger);
      color: white;
      box-shadow: 0 4px 12px 0 rgba(239, 68, 68, 0.4);
    }

    .btn-icon-only {
      padding: 0.6rem;
      border-radius: var(--radius-sm);
    }

    /* Search and filter toolbar */
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .search-input-wrapper {
      position: relative;
      flex: 1;
      min-width: 250px;
    }

    .search-input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
    }

    .search-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      color: white;
      font-family: var(--font-primary);
      transition: var(--transition-smooth);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px var(--color-primary-glow);
    }

    /* Post list grid */
    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .post-card {
      background: rgba(30, 41, 59, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      cursor: pointer;
      display: flex;
      gap: 1.5rem;
      transition: var(--transition-smooth);
    }
    .post-card:hover {
      transform: translateY(-2px);
      background: rgba(30, 41, 59, 0.55);
      border-color: rgba(139, 92, 246, 0.3);
    }

    .post-thumbnail {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
      background: rgba(15, 23, 42, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--glass-border);
    }

    .post-thumbnail img, .post-thumbnail video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-thumbnail i {
      font-size: 2rem;
      color: var(--color-text-muted);
    }

    .post-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .post-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .post-title .comments-badge {
      background: var(--color-primary-glow);
      color: #a78bfa;
      font-size: 0.8rem;
      padding: 0.15rem 0.5rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .post-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .post-meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .post-meta .author-badge {
      color: white;
      font-weight: 500;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .page-info {
      font-size: 0.95rem;
      color: var(--color-text-muted);
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition-smooth);
      padding: 1rem;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: #0f172a;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 650px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      transform: scale(0.95);
      transition: var(--transition-smooth);
    }

    .modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-family: var(--font-title);
      font-size: 1.3rem;
      font-weight: 700;
    }

    .modal-close-btn {
      background: transparent;
      border: none;
      color: var(--color-text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .modal-close-btn:hover {
      color: white;
    }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--color-text-muted);
    }

    .form-control {
      width: 100%;
      background: rgba(30, 41, 59, 0.45);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      color: white;
      font-family: var(--font-primary);
      transition: var(--transition-smooth);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 120px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* File upload area */
    .upload-zone {
      border: 2px dashed var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      background: rgba(15, 23, 42, 0.2);
      transition: var(--transition-smooth);
    }
    .upload-zone:hover {
      border-color: var(--color-primary);
      background: rgba(139, 92, 246, 0.05);
    }

    .upload-zone i {
      font-size: 2rem;
      color: var(--color-text-muted);
      margin-bottom: 0.5rem;
    }

    .upload-zone p {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .upload-zone strong {
      color: #a78bfa;
    }

    .upload-preview-container {
      margin-top: 1rem;
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--glass-border);
      display: none;
    }

    .upload-preview-container img, .upload-preview-container video {
      width: 100%;
      max-height: 250px;
      object-fit: contain;
      background: black;
      display: block;
    }

    .remove-upload-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(15, 23, 42, 0.75);
      border: none;
      color: var(--color-danger);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }
    .remove-upload-btn:hover {
      background: var(--color-danger);
      color: white;
    }

    /* Detail View Styling */
    .detail-title {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--color-text-muted);
      font-size: 0.85rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 1.5rem;
    }

    .detail-media {
      width: 100%;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1.5rem;
      border: 1px solid var(--glass-border);
      background: black;
    }

    .detail-media img, .detail-media video {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      display: block;
    }

    .detail-content {
      font-size: 1.05rem;
      white-space: pre-line;
      margin-bottom: 2rem;
    }

    /* Comments Section */
    .comments-section {
      border-top: 1px solid var(--glass-border);
      padding-top: 1.5rem;
    }

    .comments-section h4 {
      font-family: var(--font-title);
      font-size: 1.15rem;
      margin-bottom: 1rem;
    }

    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .comment-item {
      background: rgba(30, 41, 59, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1rem;
      position: relative;
    }

    .comment-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-bottom: 0.25rem;
    }

    .comment-author {
      color: white;
      font-weight: 600;
    }

    .comment-content {
      font-size: 0.95rem;
    }

    .delete-comment-btn {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      background: transparent;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      transition: var(--transition-smooth);
    }
    .delete-comment-btn:hover {
      color: var(--color-danger);
    }

    .comment-form {
      background: rgba(30, 41, 59, 0.15);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-top: 1rem;
    }

    .comment-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    /* Empty and Loading States */
    .empty-state, .loading-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-text-muted);
    }

    .empty-state i, .loading-state i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: rgba(255,255,255,0.15);
    }

    .loading-spinner {
      display: inline-block;
      width: 2.5rem;
      height: 2.5rem;
      border: 4px solid var(--color-primary-glow);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Prompt modal */
    .prompt-card {
      max-width: 400px;
    }

    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      background: #1e293b;
      border-left: 4px solid var(--color-primary);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      padding: 1rem 1.5rem;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 250px;
      color: white;
      transform: translateY(20px);
      opacity: 0;
      animation: toast-in 0.3s forwards;
    }

    @keyframes toast-in {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast-success { border-left-color: var(--color-success); }
    .toast-danger { border-left-color: var(--color-danger); }

    @media (max-width: 600px) {
      .form-row, .comment-form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Background Glows -->
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="board-container">
    
    <!-- Board Header -->
    <header class="glass-card board-header">
      <div class="board-title">
        <h1 id="widget-board-title">게시판</h1>
        <p id="widget-board-subtitle">사진, 동영상을 포스팅하고 자유롭게 의견을 나누세요.</p>
      </div>
      <button id="open-write-modal-btn" class="btn btn-primary">
        <i class="fa-solid fa-pen-nib"></i> 글쓰기
      </button>
    </header>

    <!-- Toolbar: Search -->
    <div class="toolbar">
      <div class="search-input-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="widget-search" class="search-input" placeholder="글 제목, 내용, 작성자 검색...">
      </div>
    </div>

    <!-- Posts Content -->
    <div class="glass-card">
      <div id="posts-list-target" class="posts-list">
        <!-- Dynamically Populated -->
      </div>
      
      <!-- Pagination -->
      <div id="pagination-target" class="pagination" style="display: none;">
        <button id="prev-page-btn" class="btn btn-secondary btn-icon-only" title="이전 페이지">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <span id="page-info-label" class="page-info">1 / 1 페이지</span>
        <button id="next-page-btn" class="btn btn-secondary btn-icon-only" title="다음 페이지">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Write Post Modal -->
  <div id="write-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3><i class="fa-solid fa-pen-nib text-gradient"></i> 새 글 올리기</h3>
        <button class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="write-post-form">
          <div class="form-row">
            <div class="form-group">
              <label for="post-author">작성자</label>
              <input type="text" id="post-author" class="form-control" placeholder="이름 또는 닉네임" required>
            </div>
            <div class="form-group">
              <label for="post-password">비밀번호 (수정/삭제용)</label>
              <input type="password" id="post-password" class="form-control" placeholder="비밀번호 설정" required>
            </div>
          </div>
          <div class="form-group">
            <label for="post-title">제목</label>
            <input type="text" id="post-title" class="form-control" placeholder="글 제목을 입력하세요" required>
          </div>
          <div class="form-group">
            <label for="post-content">내용</label>
            <textarea id="post-content" class="form-control" placeholder="글 내용을 입력해 주세요 (HTML은 지원되지 않습니다)"></textarea>
          </div>
          
          <div class="form-group">
            <label>미디어 첨부 (사진 또는 동영상)</label>
            <div id="drop-zone" class="upload-zone">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <p>파일을 이 곳에 <strong>드래그 앤 드롭</strong>하거나 <strong>클릭</strong>하여 선택</p>
              <p style="font-size: 0.75rem; margin-top: 4px;">최대 용량 50MB (이미지, 비디오 파일 지원)</p>
              <input type="file" id="media-file-input" style="display: none;" accept="image/*,video/*">
            </div>
            
            <!-- Upload preview -->
            <div id="upload-preview-container" class="upload-preview-container">
              <div id="upload-preview-element"></div>
              <button type="button" id="remove-upload-btn" class="remove-upload-btn" title="첨부 파일 삭제">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>
          </div>

          <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
            <button type="button" class="btn btn-secondary modal-close-action">취소</button>
            <button type="submit" id="submit-post-btn" class="btn btn-primary">등록하기</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Detail Post Modal -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3>글 상세보기</h3>
        <button class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div id="detail-content-target">
          <!-- Populated dynamically -->
        </div>

        <!-- Comments Area -->
        <div class="comments-section">
          <h4 id="comments-count-label">댓글 0</h4>
          
          <div id="comments-list-target" class="comments-list">
            <!-- Populated dynamically -->
          </div>

          <!-- Add Comment Form -->
          <form id="comment-submit-form" class="comment-form">
            <label>댓글 쓰기</label>
            <textarea id="comment-content" class="form-control" placeholder="댓글 내용을 적어주세요" required style="min-height: 60px;"></textarea>
            <div class="comment-form-row">
              <input type="text" id="comment-author" class="form-control" placeholder="이름" required>
              <input type="password" id="comment-password" class="form-control" placeholder="삭제용 비번" required>
              <button type="submit" class="btn btn-primary">댓글 등록</button>
            </div>
          </form>
        </div>
      </div>
      <div class="modal-header" style="border-top: 1px solid var(--glass-border); border-bottom: none; display: flex; justify-content: flex-end; gap: 0.5rem; padding: 1rem 1.5rem;">
        <button id="delete-post-btn-trigger" class="btn btn-danger btn-sm">
          <i class="fa-solid fa-trash-can"></i> 글 삭제
        </button>
        <button type="button" class="btn btn-secondary modal-close-action">닫기</button>
      </div>
    </div>
  </div>

  <!-- Password Prompt Modal -->
  <div id="password-prompt-modal" class="modal-overlay">
    <div class="modal-card prompt-card">
      <div class="modal-header">
        <h3>보안 확인</h3>
        <button class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="password-prompt-form">
          <div class="form-group">
            <label for="prompt-password-input">설정한 비밀번호를 입력해 주세요.</label>
            <input type="password" id="prompt-password-input" class="form-control" placeholder="비밀번호 입력" required autofocus>
          </div>
          <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem;">
            <button type="button" class="btn btn-secondary modal-close-action">취소</button>
            <button type="submit" class="btn btn-primary">확인</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- --- CONFIGURATION & CONTROLLER --- -->
  <script>
    // ==========================================
    // ⚙️ 클라이언트 연동 설정 (GitHub Pages 등에 배포 시 수정)
    // ==========================================
    // Parse URL query parameters for dynamic configuration
    const urlParams = new URLSearchParams(window.location.search);
    const ARTRACTIVE_CONFIG = {
      // API 서버 URL (GitHub Pages 배포를 위해 고정)
      SERVER_URL: 'https://apiservice.artractive.pe.kr',
      // 관리자 콘솔에서 발급받은 프로젝트의 API Key
      API_KEY: urlParams.get('key') || '', 
      // 이 정적 게시판 위젯이 바라볼 고유 게시판 Slug
      BOARD_SLUG: urlParams.get('slug') || 'default'
    };

    // --- State ---
    let currentPage = 1;
    let totalPages = 1;
    let limit = 8;
    let searchTimer = null;
    let uploadedMediaUrl = null;
    let uploadedMediaType = 'none';
    
    // Active actions caching for password prompt callbacks
    let activePostId = null;
    let activeCommentId = null;
    let promptAction = null; // 'delete_post' or 'delete_comment'

    // --- DOM Elements ---
    const postsListTarget = document.getElementById('posts-list-target');
    const paginationTarget = document.getElementById('pagination-target');
    const prevPageBtn = document.getElementById('prev-page-btn');
    const nextPageBtn = document.getElementById('next-page-btn');
    const pageInfoLabel = document.getElementById('page-info-label');
    const widgetSearch = document.getElementById('widget-search');
    
    const openWriteModalBtn = document.getElementById('open-write-modal-btn');
    const writeModal = document.getElementById('write-modal');
    const writePostForm = document.getElementById('write-post-form');
    
    const dropZone = document.getElementById('drop-zone');
    const mediaFileInput = document.getElementById('media-file-input');
    const uploadPreviewContainer = document.getElementById('upload-preview-container');
    const uploadPreviewElement = document.getElementById('upload-preview-element');
    const removeUploadBtn = document.getElementById('remove-upload-btn');
    
    const detailModal = document.getElementById('detail-modal');
    const detailContentTarget = document.getElementById('detail-content-target');
    const commentsCountLabel = document.getElementById('comments-count-label');
    const commentsListTarget = document.getElementById('comments-list-target');
    const commentSubmitForm = document.getElementById('comment-submit-form');
    const deletePostBtnTrigger = document.getElementById('delete-post-btn-trigger');
    
    const passwordPromptModal = document.getElementById('password-prompt-modal');
    const passwordPromptForm = document.getElementById('password-prompt-form');
    const promptPasswordInput = document.getElementById('prompt-password-input');

    // Update board title and subtitle dynamically based on slug
    function updateBoardHeader() {
      const titleEl = document.getElementById('widget-board-title');
      const subtitleEl = document.getElementById('widget-board-subtitle');
      if (!titleEl || !subtitleEl) return;

      const slug = ARTRACTIVE_CONFIG.BOARD_SLUG;
      if (slug === 'notice') {
        titleEl.textContent = '공지사항';
        subtitleEl.textContent = '중요한 소식과 안내사항을 확인하세요.';
      } else if (slug === 'gallery') {
        titleEl.textContent = '갤러리';
        subtitleEl.textContent = '사진과 동영상을 자유롭게 공유하세요.';
      } else if (slug === 'qna') {
        titleEl.textContent = '질문과 답변 (Q&A)';
        subtitleEl.textContent = '궁금한 점을 자유롭게 질문하고 답변받으세요.';
      } else if (slug === 'default') {
        titleEl.textContent = '자유게시판';
        subtitleEl.textContent = '다양한 생각과 일상을 공유하는 공간입니다.';
      } else {
        const capitalized = slug.charAt(0).toUpperCase() + slug.slice(1);
        titleEl.textContent = `${capitalized} 게시판`;
        subtitleEl.textContent = `이곳은 ${slug} 게시판입니다.`;
      }
    }

    // --- Core Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
      // Default configurations override checking
      // If deployed statically or running locally, print configuration log
      console.log('Artractive Board Widget initialized with config:', ARTRACTIVE_CONFIG);
      
      if (!ARTRACTIVE_CONFIG.API_KEY) {
        showErrorState('API Key가 입력되지 않았습니다. 상단 테스트 설정에서 API Key를 입력하고 [설정 적용]을 눌러주세요.');
        return;
      }
      
      updateBoardHeader();
      loadPosts();
      setupEventListeners();
    });

    // --- API Service Calls ---

    // Fetch posts list
    async function loadPosts() {
      showLoading();
      
      const searchVal = widgetSearch.value.trim();
      let url = `${ARTRACTIVE_CONFIG.SERVER_URL}/api/v1/posts?board_slug=${ARTRACTIVE_CONFIG.BOARD_SLUG}&page=${currentPage}&limit=${limit}`;
      if (searchVal) {
        url += `&search=${encodeURIComponent(searchVal)}`;
      }

      try {
        const res = await fetch(url, {
          method: 'GET',
          headers: {
            'x-api-key': ARTRACTIVE_CONFIG.API_KEY
          }
        });
        const result = await res.json();
        
        if (res.ok && result.success) {
          renderPostsList(result.data);
          updatePagination(result.pagination);
        } else {
          showErrorState(result.error || '게시글 목록을 불러오지 못했습니다.');
        }
      } catch (err) {
        showErrorState('서버와의 통신에 실패했습니다. API 설정을 확인하세요.');
      }
    }

    // Load post detail with comments
    async function loadPostDetail(postId) {
      try {
        const res = await fetch(`${ARTRACTIVE_CONFIG.SERVER_URL}/api/v1/posts/${postId}`, {
          method: 'GET',
          headers: { 'x-api-key': ARTRACTIVE_CONFIG.API_KEY }
        });
        const result = await res.json();
        
        if (res.ok && result.success) {
          activePostId = postId;
          renderPostDetail(result.data);
        } else {
          showToast(result.error || '상세보기를 로드할 수 없습니다.', 'danger');
        }
      } catch (err) {
        showToast('게시물 조회를 실패했습니다.', 'danger');
      }
    }

    // Handle File upload to server
    async function uploadFile(file) {
      const formData = new FormData();
      formData.append('file', file);
      
      showToast('미디어를 업로드하는 중...', 'primary');
      
      try {
        const res = await fetch(`${ARTRACTIVE_CONFIG.SERVER_URL}/api/v1/posts/upload`, {
          method: 'POST',
          headers: { 'x-api-key': ARTRACTIVE_CONFIG.API_KEY },
          body: formData
        });
        const result = await res.json();
        
        if (res.ok && result.success) {
          uploadedMediaUrl = result.media_url;
          uploadedMediaType = result.media_type;
          
          showToast('미디어 파일 업로드 완료!', 'success');
          renderUploadPreview();
        } else {
          showToast(result.error || '파일 업로드 실패', 'danger');
        }
      } catch (err) {
        showToast('서버 파일 업로드 중 통신 실패', 'danger');
      }
    }

    // --- DOM Renderers ---

    function renderPostsList(posts) {
      postsListTarget.replaceChildren();

      if (posts.length === 0) {
        const div = document.createElement('div');
        div.className = 'empty-state';
        div.innerHTML = `
          <i class="fa-solid fa-folder-open"></i>
          <p>등록된 게시물이 없습니다. 첫 번째 글을 작성해 보세요!</p>
        `;
        postsListTarget.appendChild(div);
        return;
      }

      posts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.addEventListener('click', () => openDetailModal(post.id));

        // Thumbnail rendering
        const thumb = document.createElement('div');
        thumb.className = 'post-thumbnail';
        
        if (post.media_url) {
          const fullMediaUrl = post.media_url.startsWith('http') ? post.media_url : ARTRACTIVE_CONFIG.SERVER_URL + post.media_url;
          if (post.media_type === 'video') {
            const vid = document.createElement('video');
            vid.src = fullMediaUrl;
            vid.muted = true;
            thumb.appendChild(vid);
          } else {
            const img = document.createElement('img');
            img.src = fullMediaUrl;
            img.alt = post.title;
            thumb.appendChild(img);
          }
        } else {
          const icon = document.createElement('i');
          icon.className = 'fa-solid fa-file-lines';
          thumb.appendChild(icon);
        }

        // Info rendering
        const info = document.createElement('div');
        info.className = 'post-info';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'post-title';
        titleDiv.textContent = post.title;
        
        if (post.comments_count > 0) {
          const badge = document.createElement('span');
          badge.className = 'comments-badge';
          badge.innerHTML = `<i class="fa-regular fa-comment"></i> ${post.comments_count}`;
          titleDiv.appendChild(badge);
        }

        const meta = document.createElement('div');
        meta.className = 'post-meta';
        
        const author = document.createElement('span');
        author.className = 'author-badge';
        author.innerHTML = `<i class="fa-solid fa-user-circle"></i> ${post.author}`;
        
        const date = document.createElement('span');
        date.innerHTML = `<i class="fa-regular fa-clock"></i> ${formatLocalDate(post.created_at)}`;
        
        const lock = document.createElement('span');
        if (post.has_password) {
          lock.innerHTML = `<i class="fa-solid fa-lock" style="color: var(--color-warning);"></i>`;
        }

        meta.appendChild(author);
        meta.appendChild(date);
        if (post.has_password) meta.appendChild(lock);

        info.appendChild(titleDiv);
        info.appendChild(meta);

        card.appendChild(thumb);
        card.appendChild(info);
        postsListTarget.appendChild(card);
      });
    }

    function renderPostDetail(post) {
      detailContentTarget.replaceChildren();

      // Title
      const h3 = document.createElement('h3');
      h3.className = 'detail-title';
      h3.textContent = post.title;

      // Meta
      const meta = document.createElement('div');
      meta.className = 'detail-meta';
      meta.innerHTML = `
        <span><i class="fa-solid fa-user-circle"></i> <strong>${post.author}</strong></span>
        <span><i class="fa-regular fa-clock"></i> ${formatLocalDate(post.created_at)}</span>
      `;

      detailContentTarget.appendChild(h3);
      detailContentTarget.appendChild(meta);

      // Media attachment
      if (post.media_url) {
        const mediaDiv = document.createElement('div');
        mediaDiv.className = 'detail-media';
        
        const fullMediaUrl = post.media_url.startsWith('http') ? post.media_url : ARTRACTIVE_CONFIG.SERVER_URL + post.media_url;
        
        if (post.media_type === 'video') {
          const video = document.createElement('video');
          video.src = fullMediaUrl;
          video.controls = true;
          video.autoplay = true;
          video.muted = true;
          mediaDiv.appendChild(video);
        } else {
          const img = document.createElement('img');
          img.src = fullMediaUrl;
          img.alt = post.title;
          mediaDiv.appendChild(img);
        }
        detailContentTarget.appendChild(mediaDiv);
      }

      // Content text
      const contentDiv = document.createElement('div');
      contentDiv.className = 'detail-content';
      contentDiv.textContent = post.content || '';
      detailContentTarget.appendChild(contentDiv);

      // Comments rendering
      commentsCountLabel.textContent = `댓글 ${post.comments.length}`;
      renderCommentsList(post.comments);
    }

    function renderCommentsList(comments) {
      commentsListTarget.replaceChildren();

      if (comments.length === 0) {
        const div = document.createElement('div');
        div.className = 'text-center text-muted py-4';
        div.style.fontSize = '0.9rem';
        div.textContent = '첫 번째 댓글을 달아주세요!';
        commentsListTarget.appendChild(div);
        return;
      }

      comments.forEach(comment => {
        const div = document.createElement('div');
        div.className = 'comment-item';

        const meta = document.createElement('div');
        meta.className = 'comment-meta';
        
        const author = document.createElement('span');
        author.className = 'comment-author';
        author.textContent = comment.author;

        const date = document.createElement('span');
        date.textContent = formatLocalDate(comment.created_at);

        meta.appendChild(author);
        meta.appendChild(date);

        const content = document.createElement('div');
        content.className = 'comment-content';
        content.textContent = comment.content;

        div.appendChild(meta);
        div.appendChild(content);

        // Delete button if password existed
        if (comment.has_password) {
          const delBtn = document.createElement('button');
          delBtn.className = 'delete-comment-btn';
          delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i> 삭제';
          delBtn.addEventListener('click', () => triggerCommentDeletion(comment.id));
          div.appendChild(delBtn);
        }

        commentsListTarget.appendChild(div);
      });
    }

    function renderUploadPreview() {
      uploadPreviewElement.replaceChildren();
      
      if (!uploadedMediaUrl) {
        uploadPreviewContainer.style.display = 'none';
        return;
      }

      const fullUrl = ARTRACTIVE_CONFIG.SERVER_URL + uploadedMediaUrl;

      if (uploadedMediaType === 'video') {
        const video = document.createElement('video');
        video.src = fullUrl;
        video.controls = true;
        uploadPreviewElement.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.src = fullUrl;
        uploadPreviewElement.appendChild(img);
      }

      uploadPreviewContainer.style.display = 'block';
    }

    function updatePagination(pagination) {
      if (!pagination || pagination.total_pages <= 1) {
        paginationTarget.style.display = 'none';
        return;
      }

      paginationTarget.style.display = 'flex';
      totalPages = pagination.total_pages;
      currentPage = pagination.current_page;

      pageInfoLabel.textContent = `${currentPage} / ${totalPages} 페이지`;
      
      prevPageBtn.disabled = (currentPage === 1);
      nextPageBtn.disabled = (currentPage === totalPages);
    }

    // --- State Handlers / Loading ---

    function showLoading() {
      postsListTarget.replaceChildren();
      const div = document.createElement('div');
      div.className = 'loading-state';
      div.innerHTML = `
        <div class="loading-spinner"></div>
        <p>게시글을 가져오는 중입니다...</p>
      `;
      postsListTarget.appendChild(div);
    }

    function showErrorState(msg) {
      postsListTarget.replaceChildren();
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.innerHTML = `
        <i class="fa-solid fa-triangle-exclamation" style="color: var(--color-danger);"></i>
        <p>${msg}</p>
        <button onclick="loadPosts()" class="btn btn-secondary mt-4 btn-sm"><i class="fa-solid fa-rotate-right"></i> 다시 불러오기</button>
      `;
      postsListTarget.appendChild(div);
    }

    // --- Event Listeners and Hooks ---

    function setupEventListeners() {
      // Search bar filter typing (with debouncing)
      widgetSearch.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          currentPage = 1;
          loadPosts();
        }, 400);
      });

      // Pagination clicks
      prevPageBtn.addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          loadPosts();
        }
      });

      nextPageBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
          currentPage++;
          loadPosts();
        }
      });

      // Modal Open/Close handlers
      openWriteModalBtn.addEventListener('click', () => {
        writeModal.classList.add('active');
      });

      document.querySelectorAll('.modal-overlay').forEach(modal => {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            closeAllModals();
          }
        });
      });

      document.querySelectorAll('.modal-close-btn, .modal-close-action').forEach(btn => {
        btn.addEventListener('click', () => {
          closeAllModals();
        });
      });

      // Drag and drop events
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--color-primary)';
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--glass-border)';
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--glass-border)';
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          validateAndUpload(files[0]);
        }
      });

      dropZone.addEventListener('click', () => {
        mediaFileInput.click();
      });

      mediaFileInput.addEventListener('change', () => {
        if (mediaFileInput.files.length > 0) {
          validateAndUpload(mediaFileInput.files[0]);
        }
      });

      removeUploadBtn.addEventListener('click', () => {
        uploadedMediaUrl = null;
        uploadedMediaType = 'none';
        mediaFileInput.value = '';
        renderUploadPreview();
      });

      // Write post form submission
      writePostForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const author = document.getElementById('post-author').value.trim();
        const password = document.getElementById('post-password').value;
        const title = document.getElementById('post-title').value.trim();
        const content = document.getElementById('post-content').value.trim();

        if (!title || !author) return;

        const submitBtn = document.getElementById('submit-post-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = '등록 중...';

        try {
          const res = await fetch(`${ARTRACTIVE_CONFIG.SERVER_URL}/api/v1/posts`, {
            method: 'POST',
            headers: {
              'x-api-key': ARTRACTIVE_CONFIG.API_KEY,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              title,
              content,
              author,
              password,
              media_url: uploadedMediaUrl,
              media_type: uploadedMediaType,
              board_slug: ARTRACTIVE_CONFIG.BOARD_SLUG
            })
          });

          const result = await res.json();
          if (res.ok && result.success) {
            showToast('글이 정상적으로 등록되었습니다.', 'success');
            writePostForm.reset();
            uploadedMediaUrl = null;
            uploadedMediaType = 'none';
            renderUploadPreview();
            closeAllModals();
            currentPage = 1;
            loadPosts();
          } else {
            showToast(result.error || '글 등록 실패', 'danger');
          }
        } catch (err) {
          showToast('서버 연동 오류가 발생했습니다.', 'danger');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '등록하기';
        }
      });

      // Comment form submission
      commentSubmitForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!activePostId) return;

        const content = document.getElementById('comment-content').value.trim();
        const author = document.getElementById('comment-author').value.trim();
        const password = document.getElementById('comment-password').value;

        if (!content || !author) return;

        try {
          const res = await fetch(`${ARTRACTIVE_CONFIG.SERVER_URL}/api/v1/posts/${activePostId}/comments`, {
            method: 'POST',
            headers: {
              'x-api-key': ARTRACTIVE_CONFIG.API_KEY,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ author, content, password })
          });
          const result = await res.json();
          
          if (res.ok && result.success) {
            showToast('댓글을 등록했습니다.', 'success');
            commentSubmitForm.reset();
            loadPostDetail(activePostId);
          } else {
            showToast(result.error || '댓글 등록 실패', 'danger');
          }
        } catch (err) {
          showToast('댓글 작성 통신 실패', 'danger');
        }
      });

      // Post Deletion Trigger
      deletePostBtnTrigger.addEventListener('click', () => {
        if (!activePostId) return;
        promptAction = 'delete_post';
        openPasswordPrompt();
      });

      // Password Prompt submit
      passwordPromptForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = promptPasswordInput.value;
        if (!password) return;

        if (promptAction === 'delete_post') {
          await deletePost(activePostId, password);
        } else if (promptAction === 'delete_comment') {
          await deleteComment(activeCommentId, password);
        }
      });
    }

    function validateAndUpload(file) {
      const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'video/mp4', 'video/webm', 'video/quicktime'];
      if (!allowed.includes(file.type)) {
        showToast('허용되지 않는 파일 형식입니다. (이미지, 비디오만 가능)', 'danger');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showToast('최대 50MB 용량까지만 업로드 가능합니다.', 'danger');
        return;
      }
      uploadFile(file);
    }

    // Open detail modal
    function openDetailModal(postId) {
      closeAllModals();
      loadPostDetail(postId);
      detailModal.classList.add('active');
    }

    // Trigger comment deletion prompt
    function triggerCommentDeletion(commentId) {
      activeCommentId = commentId;
      promptAction = 'delete_comment';
      openPasswordPrompt();
    }

    function openPasswordPrompt() {
      promptPasswordInput.value = '';
      passwordPromptModal.classList.add('active');
      setTimeout(() => promptPasswordInput.focus(), 150);
    }

    // Perform Post deletion
    async function deletePost(postId, password) {
      try {
        const res = await fetch(`${ARTRACTIVE_CONFIG.SERVER_URL}/api/v1/posts/${postId}`, {
          method: 'DELETE',
          headers: {
            'x-api-key': ARTRACTIVE_CONFIG.API_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });
        const result = await res.json();
        
        if (res.ok && result.success) {
          showToast('게시글이 삭제되었습니다.', 'success');
          closeAllModals();
          loadPosts();
        } else {
          showToast(result.error || '비밀번호가 일치하지 않거나 삭제가 거부되었습니다.', 'danger');
        }
      } catch (err) {
        showToast('게시글 삭제 요청 실패', 'danger');
      }
    }

    // Perform Comment deletion
    async function deleteComment(commentId, password) {
      try {
        const res = await fetch(`${ARTRACTIVE_CONFIG.SERVER_URL}/api/v1/comments/${commentId}`, {
          method: 'DELETE',
          headers: {
            'x-api-key': ARTRACTIVE_CONFIG.API_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });
        const result = await res.json();

        if (res.ok && result.success) {
          showToast('댓글이 삭제되었습니다.', 'success');
          hidePasswordPromptOnly();
          if (activePostId) {
            loadPostDetail(activePostId);
          }
        } else {
          showToast(result.error || '비밀번호가 일치하지 않습니다.', 'danger');
        }
      } catch (err) {
        showToast('댓글 삭제 요청 실패', 'danger');
      }
    }

    function closeAllModals() {
      writeModal.classList.remove('active');
      detailModal.classList.remove('active');
      passwordPromptModal.classList.remove('active');
      
      // Clear states if closed
      activeCommentId = null;
      promptAction = null;
    }

    function hidePasswordPromptOnly() {
      passwordPromptModal.classList.remove('active');
      activeCommentId = null;
    }

    // --- UI Utilities ---

    function formatLocalDate(isoString) {
      if (!isoString) return '-';
      let parsedDate = new Date(isoString);
      if (isNaN(parsedDate.getTime()) && !isoString.endsWith('Z')) {
        parsedDate = new Date(isoString + 'Z');
      }
      if (isNaN(parsedDate.getTime())) return isoString;

      return parsedDate.toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showToast(message, type = 'primary') {
      let toastContainer = document.getElementById('widget-toast-container');
      if (!toastContainer) {
        toastContainer = document.createElement('div');
        toastContainer.id = 'widget-toast-container';
        toastContainer.className = 'toast-container';
        document.body.appendChild(toastContainer);
      }

      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      
      let iconClass = 'fa-solid fa-info-circle';
      if (type === 'success') iconClass = 'fa-solid fa-circle-check';
      if (type === 'danger') iconClass = 'fa-solid fa-circle-exclamation';

      toast.innerHTML = `<i class="${iconClass}"></i><span>${message}</span>`;
      toastContainer.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        toast.style.transition = 'all 0.3s ease';
        toast.addEventListener('transitionend', () => toast.remove());
      }, 3000);
    }
  </script>
</body>
